<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>校園當值表查詢系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            font-family: "Microsoft JhengHei", "Heiti TC", sans-serif;
            background-color: #f3f4f6;
        }
        .fade-in {
            animation: fadeIn 0.3s ease-in-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center py-6 px-4">

    <!-- Header -->
    <header class="w-full max-w-2xl bg-white rounded-xl shadow-lg p-6 mb-6 text-center border-t-4 border-blue-600">
        <h1 class="text-2xl font-bold text-gray-800"><i class="fa-solid fa-calendar-check mr-2 text-blue-600"></i>校園當值查詢系統</h1>
        <p class="text-gray-500 text-sm mt-2">2025-2026 下學期</p>
    </header>

    <!-- Search Form -->
    <main class="w-full max-w-2xl bg-white rounded-xl shadow-lg p-6 mb-6">
        
        <!-- Tabs -->
        <div class="flex border-b border-gray-200 mb-6">
            <button id="tab-teacher" onclick="switchTab('teacher')" class="flex-1 py-2 px-4 text-blue-600 border-b-2 border-blue-600 font-medium focus:outline-none transition-colors">
                <i class="fa-solid fa-user mr-1"></i> 查老師
            </button>
            <button id="tab-time" onclick="switchTab('time')" class="flex-1 py-2 px-4 text-gray-500 hover:text-blue-500 font-medium focus:outline-none transition-colors">
                <i class="fa-solid fa-clock mr-1"></i> 查日程
            </button>
        </div>

        <div class="space-y-4">
            <!-- Input: Teacher Name (Only for Teacher Mode) -->
            <div id="input-group-name">
                <label class="block text-gray-700 text-sm font-bold mb-2">老師代號</label>
                <div class="relative">
                    <select id="teacherName" class="w-full pl-3 pr-8 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 appearance-none bg-white">
                    </select>
                    <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-2 text-gray-700">
                        <i class="fa-solid fa-chevron-down text-xs"></i>
                    </div>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <!-- Select: Day -->
                <div>
                    <label class="block text-gray-700 text-sm font-bold mb-2">星期</label>
                    <div class="relative">
                        <select id="selectDay" class="w-full pl-3 pr-8 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 appearance-none bg-white">
                            <option value="All">全部日子</option>
                            <option value="Mon">星期一</option>
                            <option value="Tue">星期二</option>
                            <option value="Wed">星期三</option>
                            <option value="Thu">星期四</option>
                            <option value="Fri">星期五</option>
                        </select>
                        <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-2 text-gray-700">
                            <i class="fa-solid fa-chevron-down text-xs"></i>
                        </div>
                    </div>
                </div>

                <!-- Select: Time Slot -->
                <div>
                    <label class="block text-gray-700 text-sm font-bold mb-2">時段</label>
                    <div class="relative">
                        <select id="selectSlot" class="w-full pl-3 pr-8 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 appearance-none bg-white">
                            <option value="all">全部時段</option>
                            <option value="morning">早上 (07:30)</option>
                            <option value="recess">小息 (一/二)</option>
                            <option value="lunch">午膳/午息</option>
                            <option value="dismissal">放學 (15:00)</option>
                        </select>
                        <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-2 text-gray-700">
                            <i class="fa-solid fa-chevron-down text-xs"></i>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Action Button -->
            <button onclick="performSearch()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-lg shadow transition-all transform active:scale-95 mt-4">
                <i class="fa-solid fa-magnifying-glass mr-2"></i> 開始查詢
            </button>
        </div>
    </main>

    <!-- Results Area -->
    <div id="result-container" class="w-full max-w-2xl hidden fade-in">
        <h3 class="text-lg font-bold text-gray-700 mb-3 px-2 border-l-4 border-yellow-500" id="result-title">查詢結果</h3>
        <div id="result-content" class="space-y-3">
            <!-- Results will be injected here -->
        </div>
    </div>

    <!-- JavaScript Logic -->
    <script>
        // --- 1. 資料庫 (從 Python 轉換而來) ---
        const daysMap = ["Mon", "Tue", "Wed", "Thu", "Fri"];
        const cnDays = ["星期一", "星期二", "星期三", "星期四", "星期五"];

        const rosterDb = {
            "午膳當值 (12:25)": {
                "一信": ["梅", "琦", "梅", "琦", "梅"],
                "一望": ["瑩", "芷", "瑩", "芷", "瑩"],
                "二信": ["盧", "盧", "盧", "盧", "盧"],
                "二望": ["梁", "梁", "梁", "梁", "梁"],
                "三信": ["申", "申", "申", "申", "申"],
                "三望": ["華", "華", "華", "華", "華"],
                "四信": ["紀", "紀", "紀", "紀", "紀"],
                "四望": ["潤", "潤", "潤", "潤", "潤"],
                "四愛": ["慧", "慧", "慧", "慧", "慧"],
                "四智": ["曾", "曾", "曾", "曾", "曾"],
                "五信": ["婷", "婷", "婷", "婷", "婷"],
                "五望": ["陳", "陳", "陳", "陳", "陳"],
                "五愛": ["敏", "敏", "敏", "敏", "敏"],
                "五智": ["耀", "耀", "耀", "耀", "耀"],
                "六信": ["伍", "徐", "伍", "徐", "伍"],
                "六望": ["茲", "佳", "茲", "佳", "茲"],
                "六愛": ["美", "露", "美", "露", "美"],
                "六智": ["燊", "鄧", "燊", "鄧", "燊"]
            },
            "早上當值 (07:30)": {
                "LG大堂":       ["吳", "鄺", "玲", "儀", "馮"],
                "支援(早讀樂)": ["馮", "吳", "姚", "鄺", "玲"],
                "一樓 (六年級)": ["徐", "驥", "佳", "鄧", "驥"],
                "二樓 (一年級)": ["琦", "",   "梅", "瑩", "耀"],
                "三樓 (二三年級)":["唐", "廖", "唐", "茲", "伍"],
                "四樓 (四年級)": ["浩", "航", "芷", "美", "露"],
                "五樓 (五年級)": ["燊", "",   "彥", "姚", ""]
            },
            "小息一當值 (09:35)": {
                "一樓": ["茲", "徐", "茲", "伍", "茲"],
                "二樓": ["梅", "梅", "琦", "芷", "瑩"],
                "三樓": ["申", "申", "盧", "盧", "申"],
                "四樓": ["婷", "婷", "梁", "吳", "梁"],
                "五樓": ["耀", "露", "敏", "耀", "敏"]
            },
            "小息二當值 (11:00)": {
                "一樓": ["美", "佳", "燊", "佳", "露"],
                "二樓": ["玲", "瑩", "華", "梅", "潤"],
                "三樓": ["潤", "華", "曾", "曾", "美"],
                "四樓": ["紀", "紀", "慧", "慧", "慧"],
                "五樓": ["露", "鄧", "儀", "陳", "陳"]
            },
            "午息當值 (13:00)": {
                "崗位1 (一樓/有蓋操場)": ["航", "玲", "吳", "馮", "佩"],
                "崗位2 (二樓/有蓋操場)": ["姚", "姚", "廖", "廖", "姚"],
                "崗位3 (三樓/乒乓球區)": ["鄺", "廖", "航", "航", "彥"],
                "崗位4 (三樓/籃球場)":   ["馮", "彥", "浩", "浩", "浩"],
                "崗位5 (四樓/籃球場)":   ["嚴", "羅", "嚴", "羅", "嚴"],
                "崗位6 (五樓/跑步區)":   ["儀", "佩", "鄺", "佩", "儀"]
            },
            "放學當值 (15:00)": {
                "LG2 指導分流(持咪)": ["羅", "嚴", "羅", "嚴", "羅"],
                "LG2 家長分流(B閘)":  ["佩", "唐", "佩", "唐", "唐"],
                "G/F 有蓋操場(持咪)": ["驥", "儀", "驥", "吳", "驥"],
                "P1-3 家長接領":      ["芷", "琦", "瑩", "華", "芷"],
                "P4-6 家長接領":      ["華", "慧", "美", "徐", "鄺"],
                "A1 沙田坳邨(隊前)":  ["梁", "梁", "徐", "紀", "佳"],
                "A2 沙田坳邨(隊後)":  ["潤", "耀", "紀", "申", "潤"],
                "B1 慈正邨(隊前)":    ["曾", "曾", "浩", "婷", "婷"],
                "B2 慈正邨(隊中)":    ["陳", "敏", "陳", "敏", "玲"],
                "B3 慈正邨(隊後)":    ["盧", "鄧", "鄧", "琦", "盧"],
                "C1 慈雲山中心(隊前)":["航", "燊", "彥", "燊", "馮"],
                "C2 慈雲山中心(隊後)":["彥", "彥", "伍", "伍", "廖"]
            }
        };

        // --- 2. 狀態管理 ---
        let currentMode = 'teacher'; // 'teacher' or 'time'

        function switchTab(mode) {
            currentMode = mode;
            const tabTeacher = document.getElementById('tab-teacher');
            const tabTime = document.getElementById('tab-time');
            const nameInputGroup = document.getElementById('input-group-name');
            const daySelect = document.getElementById('selectDay');
            
            // UI Reset
            document.getElementById('result-container').classList.add('hidden');

            if (mode === 'teacher') {
                tabTeacher.classList.add('text-blue-600', 'border-b-2', 'border-blue-600');
                tabTeacher.classList.remove('text-gray-500');
                
                tabTime.classList.remove('text-blue-600', 'border-b-2', 'border-blue-600');
                tabTime.classList.add('text-gray-500');

                nameInputGroup.classList.remove('hidden');
                
                // Allow "All" days for teacher search
                if (!daySelect.querySelector('option[value="All"]')) {
                    const option = document.createElement('option');
                    option.value = "All";
                    option.text = "全部日子";
                    daySelect.add(option, 0);
                    daySelect.value = "All";
                }
            } else {
                tabTime.classList.add('text-blue-600', 'border-b-2', 'border-blue-600');
                tabTime.classList.remove('text-gray-500');

                tabTeacher.classList.remove('text-blue-600', 'border-b-2', 'border-blue-600');
                tabTeacher.classList.add('text-gray-500');

                nameInputGroup.classList.add('hidden');

                // Remove "All" for time search (force specific day)
                const allOption = daySelect.querySelector('option[value="All"]');
                if (allOption) {
                    allOption.remove();
                    // Default to current day if Mon-Fri, else Mon
                    const today = new Date().getDay(); // 0=Sun, 1=Mon...
                    if (today >= 1 && today <= 5) {
                        daySelect.value = daysMap[today-1];
                    } else {
                        daySelect.value = "Mon";
                    }
                }
            }
        }

        // --- 3. 搜尋邏輯 ---
        function performSearch() {
            const resultContainer = document.getElementById('result-container');
            const resultContent = document.getElementById('result-content');
            const resultTitle = document.getElementById('result-title');
            
            // Get Values
            let targetName = document.getElementById('teacherName').value.trim();
            const targetDay = document.getElementById('selectDay').value;
            const targetSlot = document.getElementById('selectSlot').value;

            // Clear previous results
            resultContent.innerHTML = '';
            
            // Validation
            if (currentMode === 'teacher' && !targetName) {
                alert("請選擇老師代號！");
                return;
            }

            let foundRecords = [];

            // Main Logic
            for (const [category, locations] of Object.entries(rosterDb)) {
                
                // Time Slot Filter
                let isTimeMatch = false;
                if (targetSlot === "all") {
                    isTimeMatch = true;
                } else if (targetSlot === "morning" && category.includes("早上")) {
                    isTimeMatch = true;
                } else if (targetSlot === "lunch" && (category.includes("午膳") || category.includes("午息"))) {
                    isTimeMatch = true;
                } else if (targetSlot === "recess" && category.includes("小息")) {
                    isTimeMatch = true;
                } else if (targetSlot === "dismissal" && category.includes("放學")) {
                    isTimeMatch = true;
                }

                if (!isTimeMatch) continue;

                for (const [locName, teacherList] of Object.entries(locations)) {
                    // Iterate through Mon-Fri (indices 0-4)
                    for (let i = 0; i < teacherList.length; i++) {
                        const dayStr = daysMap[i];
                        const teacher = teacherList[i];
                        
                        // Day Filter
                        if (targetDay !== "All" && targetDay !== dayStr) continue;

                        if (currentMode === 'teacher') {
                            // Teacher Search Logic
                            if (teacher && teacher.includes(targetName)) {
                                foundRecords.push({
                                    day: cnDays[i],
                                    category: category,
                                    location: locName,
                                    teacher: teacher
                                });
                            }
                        } else {
                            // Time/Day Search Logic
                            if (teacher) {
                                foundRecords.push({
                                    day: cnDays[i],
                                    category: category,
                                    location: locName,
                                    teacher: teacher
                                });
                            }
                        }
                    }
                }
            }

            // --- 4. 渲染結果 ---
            resultContainer.classList.remove('hidden');
            
            if (foundRecords.length === 0) {
                resultContent.innerHTML = `
                    <div class="bg-red-50 text-red-600 p-4 rounded-lg text-center">
                        <i class="fa-solid fa-circle-exclamation mb-2"></i><br>
                        找不到符合條件的紀錄。
                    </div>`;
                return;
            }

            if (currentMode === 'teacher') {
                resultTitle.innerText = `搜尋結果：${targetName} 老師`;
                // Sort by day index logic for better readability
                foundRecords.sort((a, b) => {
                    return cnDays.indexOf(a.day) - cnDays.indexOf(b.day);
                });

                foundRecords.forEach(record => {
                    const card = createCard(record.day, record.category, record.location, null); // Don't show teacher name repeatedly
                    resultContent.appendChild(card);
                });
            } else {
                // Group by Category for Time Search
                resultTitle.innerText = `搜尋結果：${cnDays[daysMap.indexOf(targetDay)]}`;
                
                // Use a Set to track categories we've added headers for
                let currentCategory = "";
                
                foundRecords.forEach(record => {
                    if (record.category !== currentCategory) {
                        const header = document.createElement('div');
                        header.className = "bg-gray-200 text-gray-700 font-bold px-3 py-1 rounded mt-4 mb-2 text-sm";
                        header.innerText = record.category;
                        resultContent.appendChild(header);
                        currentCategory = record.category;
                    }
                    const card = createCard(null, null, record.location, record.teacher);
                    resultContent.appendChild(card);
                });
            }
        }

        function createCard(day, category, location, teacher) {
            const div = document.createElement('div');
            div.className = "bg-white border border-gray-200 p-4 rounded-lg shadow-sm flex justify-between items-center hover:shadow-md transition-shadow";
            
            let leftContent = `<div>`;
            if (day) leftContent += `<span class="inline-block bg-blue-100 text-blue-800 text-xs px-2 py-0.5 rounded mr-2 font-bold">${day}</span>`;
            if (category) leftContent += `<div class="text-xs text-gray-500 mb-1">${category}</div>`;
            leftContent += `<div class="font-bold text-gray-800 text-lg">${location}</div>`;
            leftContent += `</div>`;

            let rightContent = ``;
            if (teacher) {
                rightContent = `<div class="flex flex-col items-center justify-center bg-green-100 text-green-800 h-10 w-10 rounded-full font-bold shadow-sm border border-green-200">${teacher}</div>`;
            } else {
                // Icon for location
                rightContent = `<div class="text-gray-300"><i class="fa-solid fa-map-location-dot fa-lg"></i></div>`;
            }

            div.innerHTML = leftContent + rightContent;
            return div;
        }

        // Build teacher dropdown from database
        function populateTeacherSelect() {
            const nameSet = new Set();
            for (const locations of Object.values(rosterDb)) {
                for (const teacherList of Object.values(locations)) {
                    teacherList.forEach(t => { if (t) nameSet.add(t); });
                }
            }
            const sorted = [...nameSet].sort((a, b) => a.localeCompare(b, 'zh-Hant'));
            const sel = document.getElementById('teacherName');
            sel.innerHTML = '<option value="" disabled selected>請選擇老師</option>';
            sorted.forEach(name => {
                const opt = document.createElement('option');
                opt.value = name;
                opt.textContent = name;
                sel.appendChild(opt);
            });
        }

        // Initialize
        populateTeacherSelect();
        switchTab('teacher');

    </script>
</body>
</html>
